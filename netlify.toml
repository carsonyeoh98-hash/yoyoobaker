# ============================================================
# netlify.toml — Yoyoo Baker Netlify Configuration
# This file tells Netlify where your function lives
# Place this in the ROOT of your project folder
# ============================================================

[build]
  publish   = "."
  functions = "netlify/functions"

# Prevents Netlify from showing 404 on page refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
