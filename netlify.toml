# ============================================================
# netlify.toml — Yoyoo Baker
# Place this in the ROOT of your GitHub repository
# ============================================================

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
